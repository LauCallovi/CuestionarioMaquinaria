<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚜 Repasador de Maquinaria</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-900 text-white min-h-screen flex flex-col items-center p-4">

    <div id="setup" class="mt-20 text-center">
        <h1 class="text-4xl font-bold mb-4 text-green-400">🚜 Agronomía: Maquinaria</h1>
        <p class="text-slate-400 mb-8 italic">Ideal para el último repaso antes del parcial.</p>
        <button onclick="startQuiz()"
            class="bg-green-600 hover:bg-green-500 px-10 py-5 rounded-2xl font-bold text-xl shadow-lg transition-all transform hover:scale-105">
            ¡Empezar Cuestionario!
        </button>
    </div>

    <div id="quiz" class="hidden w-full max-w-xl mt-10">
        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700">
            <div class="flex justify-between mb-6 text-slate-400 font-mono">
                <span id="progress" class="bg-slate-700 px-3 py-1 rounded-full">Pregunta 1/X</span>
                <span id="score" class="text-green-400">✓ 0</span>
            </div>

            <p id="question-text" class="text-2xl font-semibold mb-8 leading-tight"></p>

            <div id="options-container" class="flex flex-col gap-3">
            </div>

            <div id="feedback" class="mt-6 p-4 rounded-xl hidden text-center font-bold"></div>
            <button id="next-btn" onclick="nextQuestion()"
                class="hidden mt-6 w-full bg-indigo-600 hover:bg-indigo-500 text-white p-4 rounded-xl font-bold text-lg uppercase tracking-wider shadow-lg">
                Siguiente Pregunta →
            </button>
        </div>
    </div>

    <script>
        // "BASE DE DATOS" 
        const allQuestions = [
            {
                type: "mult",
                p: "Cuando la corona de un mecanismo diferencial gira 150 vueltas y la rueda derecha gira 75 vueltas, ¿cuántas vueltas gira la rueda izquierda?",
                choices: ["225 vueltas", "125 vueltas", "75 vueltas", "85 vueltas", "175 vueltas"],
                r: 0,
                o: "Fórmula: V_corona = (V_izq + V_der) / 2. Entonces: 150 = (V_izq + 75) / 2 -> 300 = V_izq + 75 -> V_izq = 225."
            },
            {
                type: "mult",
                p: "El termostato es una válvula colocada en:",
                choices: ["El árbol de levas", "El circuito de refrigeración por agua", "La bomba inyectora", "El caño de escape", "Ninguna es correcta"],
                r: 1,
                o: "El termostato regula la temperatura del motor abriendo o cerrando el paso del líquido refrigerante."
            },
            {
                type: "mult",
                p: "La función de la Caja de Velocidades de un tractor es:",
                choices: ["Aumentar el número de revoluciones del motor", "Disminuir el número de revoluciones del motor", "Disminuir la potencia del motor", "Combinar los factores Momento y Velocidad Angular", "Aumentar la potencia del motor"],
                r: 3,
                o: "La caja transforma el par (momento) y la velocidad, manteniendo la potencia constante (menos pérdidas por rozamiento)."
            },

            // --- IMAGEN 9 ---
            {
                type: "mult",
                p: "Cuando el tractor de tracción simple (2WD) está tirando, la carga mínima que deben soportar las ruedas delanteras debe ser aproximadamente:",
                choices: ["1/3 del peso del tractor sin contrapesos", "1/3 del peso delantero del tractor sin contrapesos", "1/5 del peso del tractor sin contrapesos", "Un 20% del peso delantero del tractor con contrapesos", "Ninguna es correcta"],
                r: 2,
                o: "Por seguridad de dirección, se requiere que al menos el 20% (1/5) del peso total permanezca en el eje delantero durante la tracción."
            },
            {
                type: "mult",
                p: "¿A qué nos referimos cuando hablamos de coeficiente de tracción en un tractor de tracción simple?",
                choices: ["A la capacidad de tracción máxima con patinaje del 16%", "A la relación de la fuerza de tiro y el peso total del tractor", "A la relación de la fuerza de tiro en el eje x y el peso delantero del tractor", "Ninguna es correcta"],
                r: 1,
                o: "El coeficiente de tracción (μ) relaciona la fuerza de tiro obtenida con el peso que adhiere al suelo."
            },
            {
                type: "mult",
                p: "Si un neumático se identifica como 480/65 R 28; 136; A8; TUBELESS. ¿Qué significa?",
                choices: ["Ancho 480mm, relación altura/ancho 65%, radio 28 pulgadas...", "Ancho 480mm, altura del balón 65% del ancho, Radial, llanta de 28 pulgadas, índice carga 136, código velocidad A8", "Ancho 48cm, altura 65cm, radio 28cm...", "Ninguna es correcta"],
                r: 1,
                o: "480 es el ancho en mm, 65 es el perfil (%), R es Radial y 28 es el diámetro de la llanta en pulgadas."
            },

            // --- IMAGEN 10 ---
            {
                type: "mult",
                p: "La potencia con que se compra un tractor, el motor ¿a qué RPM gira?",
                choices: ["Al número de revoluciones máximo", "Al número de revoluciones de par nominal", "Al número de revoluciones de par motor mínimo", "Al número de revoluciones de Consumo específico mínimo", "Al número de revoluciones de par motor máximo"],
                r: 1,
                o: "La potencia nominal de catálogo se define a las RPM nominales, donde el motor entrega su máximo rendimiento de trabajo continuo."
            },

            // --- IMAGEN 11 ---
            {
                type: "mult",
                p: "El consumo específico de un motor de un tractor es mínimo cuando el motor gira:",
                choices: ["Al máximo de revoluciones", "Al número de revoluciones de par motor mínimo", "Al número de revoluciones de potencia máxima", "Al número de revoluciones de potencia mínima", "Al número de revoluciones de par motor máximo"],
                r: 4,
                o: "El punto de mayor eficiencia térmica suele coincidir con el régimen de par motor máximo."
            },
            {
                type: "mult",
                p: "El lastrado dinámico depende de:",
                choices: ["Altura del tractor, altura de enganche, longitud, fuerza de tiro", "Altura de enganche, distancia entre centro de tiro y enganche, batalla y fuerza de tiro", "Ubicación del centro de gravedad, lastre líquido y ejes", "Todas son correctas", "Ninguna es correcta"],
                r: 1,
                o: "El lastrado dinámico es la transferencia de peso del eje delantero al trasero durante la tracción."
            },
            {
                type: "mult",
                p: "Cuando un motor es sobrealimentado decimos que posee:",
                choices: ["Common Rail", "Bomba inyectora multipunto", "Turbo", "Intercooler", "f. C y D son correctas"],
                r: 2,
                o: "La sobrealimentación estándar se logra mediante un turbocompresor (Turbo)."
            },

            // --- IMAGEN 12 ---
            {
                type: "mult",
                p: "La traba de diferencial se utiliza para:",
                choices: ["Mantener constante la potencia en ambas ruedas", "Mantener constante el momento en ambas ruedas", "Mantener constante la velocidad en ambas ruedas", "Aumentar la posibilidad de empuje con ambas ruedas", "f. C y D son correctas"],
                r: 4,
                o: "El bloqueo obliga a ambas ruedas a girar a la misma velocidad, mejorando el empuje en suelos resbaladizos. (C y D son correctas)."
            },
            {
                type: "mult",
                p: "El rendimiento económico tiene en cuenta:",
                choices: ["Pérdidas por calor en combustión", "Rozamiento en embrague", "Rozamiento mecanismos internos motor", "Rozamiento en caja, diferencial y reducción final", "f. A y C son correctas"],
                r: 5,
                o: "El rendimiento económico/térmico principal se pierde en calor y fricción interna del propio motor."
            },
            {
                type: "bool",
                p: "¿El par motor máximo se logra a un número de revoluciones (RPM) menor que el de potencia máxima?",
                r: "V",
                o: "Correcto. El torque máximo ocurre primero; luego, al aumentar las RPM, se alcanza la potencia máxima."
            },
            {
                type: "bool",
                p: "¿La potencia de un motor es el producto del Momento (Torque) por la Velocidad Angular?",
                r: "V",
                o: "Es la definición física básica de potencia rotacional: $P = M \cdot \omega$."
            },

            // --- IMAGEN 21 ---
            {
                type: "mult",
                p: "En igualdad de dimensiones y presión, ¿cuál neumático ofrece una mayor 'mancha de contacto' y mejor eficiencia de tracción?",
                choices: ["Neumático Diagonal", "Neumático Radial", "Neumático Macizo", "Ambos son iguales"],
                r: 1,
                o: "El neumático Radial se deforma de manera más uniforme, logrando una huella más larga y mayor tracción."
            },
            {
                type: "mult",
                p: "La adherencia de un tractor de tracción simple (2WD) depende principalmente de:",
                choices: ["El peso total del tractor", "El peso que carga sobre el eje trasero y el tipo de suelo", "La potencia del motor únicamente", "La velocidad de avance"],
                r: 1,
                o: "En un 2WD, solo el peso sobre las ruedas motrices (traseras) genera fuerza de pegado al suelo (adherencia)."
            },

            // --- IMAGEN 22 ---
            {
                type: "mult",
                p: "Para un tractor 2WD trabajando en suelo firme (rastrojo), el patinamiento óptimo debe rondar el:",
                choices: ["0 al 5%", "10 al 15%", "20 al 25%", "Más del 30%"],
                r: 1,
                o: "Un patinamiento del 10-15% es el compromiso ideal entre fuerza de tiro y eficiencia energética."
            },

            // --- IMAGEN 23 ---
            {
                type: "mult",
                p: "En el ciclo teórico Diésel de 4 tiempos, el calor se aporta (combustión) teóricamente a:",
                choices: ["Volumen constante", "Presión constante", "Temperatura constante", "Ninguna es correcta"],
                r: 1,
                o: "A diferencia del ciclo Otto (nafta) que es a volumen constante, el Diésel ideal quema a presión constante."
            },
            {
                type: "mult",
                p: "¿Cuál es el orden de encendido más común en un motor de 4 cilindros en línea?",
                choices: ["1-2-3-4", "1-4-3-2", "1-3-4-2", "1-2-4-3"],
                r: 2,
                o: "El orden 1-3-4-2 es el estándar para equilibrar las vibraciones y fuerzas en el cigüeñal."
            },

            // --- IMAGEN 26 ---
            {
                type: "mult",
                p: "La Relación de Compresión en motores Diésel agrícolas suele oscilar entre:",
                choices: ["7:1 a 10:1", "12:1 a 14:1", "16:1 a 22:1", "30:1 a 40:1"],
                r: 2,
                o: "Los Diésel requieren relaciones altas (16:1 a 22:1) para generar el calor necesario para la autoignición."
            },
            {
                type: "mult",
                p: "El componente encargado de enviar combustible a alta presión a cada inyector en el momento justo es:",
                choices: ["La bomba de transferencia", "El carburador", "La bomba inyectora", "El filtro de gasoil"],
                r: 2,
                o: "La bomba inyectora es el 'cerebro' del sistema de combustible Diésel convencional."
            },
            {
                type: "bool",
                p: "¿Las válvulas de escape suelen ser de mayor diámetro que las de admisión?",
                r: "F",
                o: "Es al revés. Las de admisión suelen ser más grandes para facilitar la entrada de aire fresco al cilindro."
            }
        ]

        let currentQuestions = []; // Las preguntas seleccionadas para la sesión actual
        let currentIdx = 0;
        let score = 0;
        const QUESTIONS_PER_QUIZ = 10; // <--- AJUSTA AQUÍ cuántas preguntas quieres por ronda

        function startQuiz() {
            // 2. Mezclar TODA la base de datos
            const shuffled = [...allQuestions].sort(() => Math.random() - 0.5);

            // 3. Seleccionar solo una parte para esta vez (para que no sea eterno y no se repitan)
            currentQuestions = shuffled.slice(0, QUESTIONS_PER_QUIZ);

            currentIdx = 0;
            score = 0;
            document.getElementById('score').innerText = `✓ 0`;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('quiz').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuestions[currentIdx];
            const container = document.getElementById('options-container');
            const feedback = document.getElementById('feedback');
            const nextBtn = document.getElementById('next-btn');

            document.getElementById('question-text').innerText = q.p;
            document.getElementById('progress').innerText = `Pregunta ${currentIdx + 1}/${currentQuestions.length}`;

            container.innerHTML = "";
            feedback.classList.add('hidden');
            nextBtn.classList.add('hidden');

            if (q.type === "bool") {
                createButton("VERDADERO", () => checkAnswer("V"));
                createButton("FALSO", () => checkAnswer("F"));
            } else {
                q.choices.forEach((choice, index) => {
                    createButton(choice, () => checkAnswer(index));
                });
            }
        }

        function createButton(text, callback) {
            const btn = document.createElement("button");
            btn.innerText = text;
            // Estilos mejorados para pulgares en móviles
            btn.className = "bg-slate-700 hover:bg-slate-600 p-5 rounded-xl text-left font-medium transition-all border border-slate-600 active:scale-95 touch-manipulation";
            btn.onclick = () => {
                const buttons = document.getElementById('options-container').querySelectorAll('button');
                buttons.forEach(b => b.disabled = true);
                callback();
            };
            document.getElementById('options-container').appendChild(btn);
        }

        function checkAnswer(userAns) {
            const q = currentQuestions[currentIdx];
            const feedback = document.getElementById('feedback');
            const nextBtn = document.getElementById('next-btn');

            let isCorrect = (userAns === q.r);

            if (isCorrect) {
                score++;
                feedback.innerText = "✅ ¡Correcto! " + (q.o || "");
                feedback.className = "mt-6 p-4 rounded-xl text-center font-bold bg-green-900/40 text-green-300 border border-green-500/50";
            } else {
                let correctLabel = q.type === "bool" ? (q.r === "V" ? "Verdadero" : "Falso") : q.choices[q.r];
                feedback.innerText = `❌ Incorrecto. Era: ${correctLabel}. ` + (q.o || "");
                feedback.className = "mt-6 p-4 rounded-xl text-center font-bold bg-red-900/40 text-red-300 border border-red-500/50";
            }

            feedback.classList.remove('hidden');
            nextBtn.classList.remove('hidden');
            document.getElementById('score').innerText = `✓ ${score}`;
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < currentQuestions.length) {
                showQuestion();
            } else {
                // Pantalla final con feedback del desempeño
                let mensajeFinal = score > (QUESTIONS_PER_QUIZ * 0.7) ? "¡Estás lista para el parcial! 🎓" : "¡A seguir repasando! 💪";
                document.getElementById('quiz').innerHTML = `
                <div class="text-center p-10">
                    <h2 class="text-3xl font-bold mb-4">${mensajeFinal}</h2>
                    <p class="text-xl mb-6">Puntaje: <span class="text-green-400 font-bold">${score}/${currentQuestions.length}</span></p>
                    <button onclick="location.reload()" class="bg-indigo-600 px-8 py-4 rounded-xl font-bold shadow-lg">Intentar otra ronda</button>
                </div>
            `;
            }
        }
    </script>
</body>

</html>
